name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Gate de FR-054: teste de integração que garante que sync do Discogs
  # NUNCA sobrescreve campos autorais (Princípio I da Constituição).
  # Este gate bloqueia merge se falhar.
  constitution:
    name: Princípio I (FR-054)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sulco
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sulco/package-lock.json
      - run: npm ci
      - run: npm run test:constitution

  # Lint + type-check + testes unitários gerais (não bloqueiam merge
  # de forma tão absoluta, mas ficam visíveis no PR).
  quality:
    name: Tipagem + testes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sulco
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sulco/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
